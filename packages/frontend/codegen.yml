overwrite: true
schema: 'http://localhost:4000'
documents: 'src/queries/*.ts'
generates:
  src/generated/queries.ts:
    config:
      scalars:
        Date: string
        Time: string
        DateTime: string
      apolloReactHooksImportFrom: '@apollo/client/react'
      apolloReactCommonImportFrom: '@apollo/client/react'
      withHooks: true
      withSuspense: false
      withComponent: false
      withHOC: false
      enumsAsTypes: true
      preResolveTypes: false
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-react-apollo'
  ./graphql.schema.json:
    plugins:
      - 'introspection'
hooks:
  afterAllFileWrite:
    - node scripts/cleanup-codegen.mjs
    - ../../node_modules/.bin/prettier --write
